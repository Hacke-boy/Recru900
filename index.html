<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>900 YEAR'S ESPORT | RECRUTEMENT</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <div class="logo-load">900</div>
            <div class="bar-container">
                <div class="bar"></div>
            </div>
            <p>CHARGEMENT DE L'EMPIRE...</p>
        </div>
    </div>

    <div id="site-content" style="display:none;">
        <header>
            <div class="brand">900 <span class="red">YEAR'S</span> ESPORT</div>
        </header>

        <section id="hero">
            <h1>RECRUTEMENT <span class="red">FREE FIRE</span></h1>
            <p>REJOINS L'ÉLITE. ÉCRASE LA CONCURRENCE.</p>
        </section>

        <section id="formulaire">
            <div class="form-card">
                <h2>POSTULER</h2>
                <form action="https://formsubmit.co/ldorce30@gmail.com" method="POST">
                    <input type="text" name="Pseudo" placeholder="ID / PSEUDO EN JEU" required>
                    <input type="number" name="Niveau" placeholder="TON NIVEAU (59 MIN)" min="59" required>
                    
                    <p class="label">CHOISIS TON RÔLE :</p>
                    <div class="roles">
                        <label><input type="checkbox" name="Role" value="Rush"> RUSH</label>
                        <label><input type="checkbox" name="Role" value="Sniper"> SNIPER</label>
                        <label><input type="checkbox" name="Role" value="Support"> SUPPORT</label>
                    </div>

                    <textarea name="Message" placeholder="TES MOTIVATIONS..."></textarea>
                    
                    <input type="hidden" name="_next" value="https://hacke-boy.github.io/Recru900/">
                    <button type="submit">ENVOYER LA CANDIDATURE</button>
                </form>
            </div>
        </section>
    </div>

    <script>
        // Script pour la page de chargement
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('site-content').style.display = 'block';
            }, 2500); // 2.5 secondes de chargement
        };
    </script>
</body>
</html>
